# GRUB2 configuration for Nymoris

set timeout=3
set default=0

menuentry "Nymoris Agentic OS" {
    linux /boot/vmlinuz console=tty0 panic=1 quiet loglevel=0
    initrd /boot/initramfs.cpio.gz
}

menuentry "Nymoris (serial debug)" {
    linux /boot/vmlinuz console=ttyS0,115200 panic=1
    initrd /boot/initramfs.cpio.gz
}
